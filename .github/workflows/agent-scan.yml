name: Agent Scan

# Scans the published skills for prompt injection, tool poisoning, malware
# hidden in instructions, and leaked secrets using Snyk's agent-scan
# (https://github.com/snyk/agent-scan). Runs on every PR and push to main so a
# bad skill (or a compromised bundled script) is caught before it ships.
#
# Setup: add a repository secret named SNYK_TOKEN
#   (Settings > Secrets and variables > Actions > New repository secret).
#   Get the token from https://app.snyk.io/account
#
# Note: agent-scan sends skill names, descriptions, and tool definitions to the
# Snyk Agent Scan API for analysis. Snyk states it does not store or log them.

on:
  pull_request:
    paths:
      - "skills/**"
      - ".github/workflows/agent-scan.yml"
  push:
    branches: [main]
    paths:
      - "skills/**"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Scan skills with Snyk agent-scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # --ci exits non-zero on findings so the scan can gate merges.
        # It requires --dangerously-run-mcp-servers, which only spawns
        # subprocesses for stdio MCP servers in the scanned configs. This repo
        # ships skills only (no MCP servers), so the flag is inert here. Revisit
        # if a skill that bundles an MCP server is ever added.
        #
        # --ignore-issues-codes: reviewed and accepted as inherent to these skills,
        # not defects (real findings like leaked credentials are NOT ignored):
        #   W011 third-party content exposure — agent-browser and research-first
        #        exist to ingest web/page content; documented as untrusted in each
        #        skill's Security note.
        #   W012 external URL executed at runtime — performance-testing's example
        #        uses the official, version-pinned k6 jslib CDN.
        #   W021 hidden Unicode — zero-width joiners / variation selectors inside
        #        example emoji (e.g. the family emoji in writing-tests' edge-case
        #        checklist), not obfuscation.
        run: uvx --python 3.12 snyk-agent-scan@latest ./skills --ci --dangerously-run-mcp-servers --ignore-issues-codes W011,W012,W021
